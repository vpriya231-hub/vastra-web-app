```yaml
name: Build Android App from Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Capacitor & Wrap App
      run: |
        # package.json ഫയൽ ഇല്ലെങ്കിൽ പുതിയത് ഉണ്ടാക്കാൻ
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # കാപ്പാസിറ്റർ ഇൻസ്റ്റാൾ ചെയ്യാൻ
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # വെബ് ആപ്പ് വിവരങ്ങൾ വെച്ച് കാപ്പാസിറ്റർ സെറ്റ് ചെയ്യാൻ
        npx cap init "V Astra Create" "com.vpriya.vastra" --web-dir=. --confirm
        
        # ആൻഡ്രോയിഡ് പ്ലാറ്റ്‌ഫോം ആഡ് ചെയ്യാൻ
        npx cap add android

    - name: Sync Web Assets to Android Project
      run: |
        npx cap sync android

    - name: Give Execute Permission to Gradle
      run: |
        # ബിൽഡ് എറർ വരാതിരിക്കാൻ പെർമിഷൻ കൊടുക്കുന്നു
        chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Build Release AAB
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: V-Astra-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release AAB Artifact
      uses: actions/upload-artifact@v3
      with:
        name: V-Astra-Release-AAB
        path: android/app/build/outputs/bundle/release/app-release.aab

```

