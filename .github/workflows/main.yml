```yaml
name: Build Android App from Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Capacitor & Wrap App
      run: |
        # Initialize npm if package.json doesn't exist
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Install Capacitor dependencies
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # Initialize Capacitor configuration with app details
        npx cap init "V Astra Create" "com.vpriya.vastra" --web-dir=. --confirm
        
        # Add Android Platform
        npx cap add android

    - name: Sync Web Assets to Android Project
      run: |
        npx cap sync android

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Build Release AAB
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: V-Astra-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release AAB Artifact
      uses: actions/upload-artifact@v3
      with:
        name: V-Astra-Release-AAB
        path: android/app/build/outputs/bundle/release/app-release.aab

```
