name: Build Android App from Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Prepare Clean Web Assets Folder (www)
      run: |
        # www എന്ന പേരില്‍ ഒരു പുതിയ ഫോള്‍ഡര്‍ ഉണ്ടാക്കുന്നു
        mkdir -p www
        # വെബ് ഫയലുകള്‍ മാത്രം (HTML, JS, CSS, ചിത്രങ്ങള്‍) www ഫോള്‍ഡറിലേക്ക് മാറ്റുന്നു
        # node_modules, .git, .github എന്നിവ ഒഴിവാക്കും
        rsync -av --exclude='node_modules' --exclude='.git' --exclude='.github' --exclude='android' --exclude='www' ./ www/

    - name: Install Capacitor & Wrap App
      run: |
        # package.json ഫയല്‍ ഇല്ലെങ്കില്‍ ഉണ്ടാക്കുന്നു
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # കാപ്പാസിറ്റര്‍ ഇന്‍സ്റ്റാള്‍ ചെയ്യുന്നു
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # www ഫോള്‍ഡര്‍ മെയിന്‍ വെബ് ഡയറക്ടറിയാക്കി കാപ്പാസിറ്റര്‍ സെറ്റ് ചെയ്യുന്നു
        npx cap init "V Astra Create" "com.vpriya.vastra" --web-dir=www --confirm
        
        # ആന്‍ഡ്രോയിഡ് പ്ലാറ്റ്‌ഫോം ആഡ് ചെയ്യുന്നു
        npx cap add android

    - name: Sync Web Assets to Android Project
      run: |
        npx cap sync android

    - name: Give Execute Permission to Gradle
      run: |
        chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Build Release AAB
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: V-Astra-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release AAB Artifact
      uses: actions/upload-artifact@v3
      with:
        name: V-Astra-Release-AAB
        path: android/app/build/outputs/bundle/release/app-release.aab
